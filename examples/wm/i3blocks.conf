# i3blocks. Paste into ~/.config/i3blocks/config. Requires jq.
[mvad]
command=mvad status --format=waybar | jq -r '.text, .text, (if .class=="connected" then "#5fff5f" else "#ff5f5f" end)'
interval=2

# Without jq, plain text + exit-code label:
# [mvad]
# label=mvad:
# command=mvad status | head -n1
# interval=2
